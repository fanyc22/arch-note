name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: npm test

      - name: Build XPI
        run: npm run build

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-note-zotero-deepseek-xpi
          path: dist/*.xpi
